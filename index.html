<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY ART LENS - 전시 관람 미니 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #faf8f5; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8 max-w-md mx-auto min-h-screen flex flex-col justify-between select-none">

    <!-- [STEP 1] 목적 선택 화면 -->
    <div id="step-question" class="fade-in flex flex-col justify-center my-auto">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">🔎 MY ART LENS</h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">오늘 전시, 어떤 목적으로 관람하시나요?</p>
            <p class="text-xs text-slate-400 mt-1">목적을 선택하시면 나만의 관람 렌즈(질문지)가 열립니다.</p>
        </header>

        <div class="space-y-6">
            <!-- 고전 회화 그룹 -->
            <div>
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5 pl-1">🏛️ 고전·전통 회화 위주 전시</h2>
                <div class="space-y-2">
                    <button onclick="showCard('CA')" class="w-full text-left p-3.5 bg-white border border-slate-200 hover:border-rose-300 rounded-xl shadow-sm flex items-center transition-all active:scale-[0.98]">
                        <span class="text-xl mr-3">👤</span>
                        <div>
                            <div class="text-sm font-bold text-slate-800">화가의 내면과 인생 추적</div>
                            <div class="text-[11px] text-slate-400 mt-0.5">거장의 파란만장한 삶과 숨겨진 고독·열정 읽기</div>
                        </div>
                    </button>
                    <button onclick="showCard('CB')" class="w-full text-left p-3.5 bg-white border border-slate-200 hover:border-cyan-300 rounded-xl shadow-sm flex items-center transition-all active:scale-[0.98]">
                        <span class="text-xl mr-3">🗺️</span>
                        <div>
                            <div class="text-sm font-bold text-slate-800">숨은 상징과 배경 보물찾기</div>
                            <div class="text-[11px] text-slate-400 mt-0.5">그림 속 오브제와 역사적 비하인드 해독하기</div>
                        </div>
                    </button>
                    <button onclick="showCard('CC')" class="w-full text-left p-3.5 bg-white border border-slate-200 hover:border-emerald-300 rounded-xl shadow-sm flex items-center transition-all active:scale-[0.98]">
                        <span class="text-xl mr-3">⚡</span>
                        <div>
                            <div class="text-sm font-bold text-slate-800">틀을 깨부순 구조와 파격</div>
                            <div class="text-[11px] text-slate-400 mt-0.5">원근법과 고정관념을 거부한 혁명적 시선 포착</div>
                        </div>
                    </button>
                    <button onclick="showCard('CD')" class="w-full text-left p-3.5 bg-white border border-slate-200 hover:border-purple-300 rounded-xl shadow-sm flex items-center transition-all active:scale-[0.98]">
                        <span class="text-xl mr-3">🛋️</span>
                        <div>
                            <div class="text-sm font-bold text-slate-800">온전한 시각적 치유와 휴식</div>
                            <div class="text-[11px] text-slate-400 mt-0.5">분석 없이 색채 리듬 속에서 멍하니 힐링하기</div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- 현대 일러스트 그룹 -->
            <div>
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5 pl-1">🎨 현대·일러스트·팝아트 전시</h2>
                <div class="space-y-2">
                    <button onclick="showCard('MA')" class="w-full text-left p-3.5 bg-white border border-slate-200 hover:border-rose-300 rounded-xl shadow-sm flex items-center transition-all active:scale-[0.98]">
                        <span class="text-xl mr-3">🖼️</span>
                        <div>
                            <div class="text-sm font-bold text-slate-800">내 방에 소장하고 싶은 취향 저격</div>
                            <div class="text-[11px] text-slate-400 mt-0.5">트렌디한 색감과 힙한 비주얼 위주로 감상하기</div>
                        </div>
                    </button>
                    <button onclick="showCard('MB')" class="w-full text-left p-3.5 bg-white border border-slate-200 hover:border-cyan-300 rounded-xl shadow-sm flex items-center transition-all active:scale-[0.98]">
                        <span class="text-xl mr-3">🔋</span>
                        <div>
                            <div class="text-sm font-bold text-slate-800">도파민과 긍정 바이브 충전</div>
                            <div class="text-[11px] text-slate-400 mt-0.5">스포츠의 역동성과 행운의 에너지 가득 받기</div>
                        </div>
                    </button>
                    <button onclick="showCard('MC')" class="w-full text-left p-3.5 bg-white border border-slate-200 hover:border-emerald-300 rounded-xl shadow-sm flex items-center transition-all active:scale-[0.98]">
                        <span class="text-xl mr-3">🫂</span>
                        <div>
                            <div class="text-sm font-bold text-slate-800">일상 속 격한 친근 공감</div>
                            <div class="text-[11px] text-slate-400 mt-0.5">그림 속 인물이나 상황에서 나의 모습 발견하기</div>
                        </div>
                    </button>
                    <button onclick="showCard('MD')" class="w-full text-left p-3.5 bg-white border border-slate-200 hover:border-purple-300 rounded-xl shadow-sm flex items-center transition-all active:scale-[0.98]">
                        <span class="text-xl mr-3">🃏</span>
                        <div>
                            <div class="text-sm font-bold text-slate-800">귀여운 반전 위트와 뼈 때리기</div>
                            <div class="text-[11px] text-slate-400 mt-0.5">무해한 비주얼 뒤에 숨은 영리한 풍자 사냥하기</div>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- [STEP 2] 단일 미션 카드 화면 -->
    <div id="step-card" class="fade-in hidden flex-col justify-between flex-grow my-auto">
        <div id="card-content" class="w-full">
            <!-- 자바스크립트로 선택한 카드가 여기에 렌더링됩니다 -->
        </div>

        <!-- 다시 선택하기 하단 고정 버튼 -->
        <button onclick="resetApp()" class="w-full mt-8 py-3.5 bg-slate-800 text-white font-medium text-sm rounded-xl shadow-md hover:bg-slate-900 transition-all active:scale-[0.99]">
            🔄 다른 목적으로 다시 선택하기
        </button>
    </div>

    <!-- 푸터 -->
    <footer class="text-center pt-8 pb-2">
        <p class="text-[10px] text-slate-400 tracking-wider">© 2026 ART LENS CREW. ALL RIGHTS FREE.</p>
    </footer>

    <script>
        // 전시장 카드 데이터 마스터셋
        const cardsData = {
            // 고전
            CA: { title: '👤 [인생 추적] 화가의 비밀 방', border: 'border-rose-400', bg: 'bg-rose-50/50', desc: '거장의 파란만장한 삶과 거친 붓질 속에 숨겨진 진짜 인간적인 감정(고독, 열정, 광기)을 추적합니다.', q1: '노화가 혹은 청년 시절의 화가가 가장 ‘흑화’했거나 속마음을 고백한 듯한 작품은 무엇인가요?', q2: '그림 속 빛과 어둠, 거친 질감 중 내 눈길을 가장 오랫동안 붙잡아둔 디테일은 어디였나요?', m: '시대의 한계를 부수고 화가가 남긴 흔적 중 가장 강렬했던 작품 3가지와 그 이유는 무엇인가요?' },
            CB: { title: '🗺️ [상징 분석] 숨은 의미 보물찾기', border: 'border-cyan-500', bg: 'bg-cyan-50/50', desc: '그림 속 사물(오브제)이나 인물의 배치를 통해 당시 사회상이나 화가가 숨겨놓은 알레고리를 해독합니다.', q1: '제목이나 해설을 읽고 나서야 "아하!" 하고 무릎을 치게 만든 반전의 상징물은 무엇이었나요?', q2: '만약 내가 당시의 권력자(왕, 문인)였다면 이 그림을 보고 만족했을지, 아니면 분노했을지 상상해 보세요.', m: '당대 최고의 역사적 정황이나 은밀한 메시지가 가득했던 작품 3가지와 그 이유는 무엇인가요?' },
            CC: { title: '⚡ [구조 파괴] 규칙을 부수는 혁명가', border: 'border-emerald-500', bg: 'bg-emerald-50/50', desc: '사물의 원래 색이나 전통 원근법을 거부하고, 시각적 해방과 입체적 실험을 시도한 파격적 지점을 포착합니다.', q1: '전통적인 미의 기준을 과감히 깨부순 가장 파격적이고 난해한 조형물(그림)은 무엇인가요?', q2: '선과 색이 따로 노는 듯하면서도 묘하게 화면 전체에 생동감을 주는 구간을 발견하셨나요?', m: '작가의 천재적인 규칙 파괴력이 돋보인 원픽 작품 3가지와 그 이유는 무엇인가요?' },
            CD: { title: '🛋️ [정신 정화] 안락의자 같은 휴식', border: 'border-purple-500', bg: 'bg-purple-50/50', desc: '머리 아픈 분석은 내려놓고, 대화와 캔버스가 뿜어내는 색채 리듬 속에서 온전한 치유와 조화를 느낍니다.', q1: '보는 순간 머릿속 잡념을 지워주고 마음에 깊은 평온함을 준 정적인 공간(작품)은 어디였나요?', q2: '그림을 가만히 응시하는 동안 묘하게 특정 소리나 계절의 대기가 느껴진 구간이 있었나요?', m: '의미를 떠나 그저 오랫동안 멍하니 바라보고 싶었던 힐링 작품 3가지와 그 이유는 무엇인가요?' },
            // 현대
            MA: { title: '🖼️ [취향 저격] 내 방에 걸고 싶은 그림', border: 'border-rose-400', bg: 'bg-rose-50/50', desc: '복잡한 세계관은 빼고, 오직 내 눈과 트렌디한 감각에 가장 예뻐 보이고 끌리는 비주얼을 수집합니다.', q1: '보자마자 "색감 미쳤다!" 소리가 나와 인스타 스토리에 공유하고 싶어진 컷은 무엇인가요?', q2: '이 작가가 유명 브랜드와 콜라보 굿즈를 만든다면 어떤 브랜드와 가장 찰떡일 것 같나요?', m: '내 홈 인테리어로 당장 포스터나 엽서로 소장하고 싶었던 작품 3가지와 그 이유는 무엇인가요?' },
            MB: { title: '🔋 [도파민 충전] 활기찬 긍정 바이브', border: 'border-cyan-500', bg: 'bg-cyan-50/50', desc: '스포츠의 역동성, 럭키한 에너지, 통통 튀는 위트 코드를 찾아 지친 일상에 엔도르핀을 가득 채웁니다.', q1: '보고 있으면 나도 모르게 피식 웃음이 터지거나 운동 욕구를 자극하는 액티브한 구간은 어디인가요?', q2: '전시장 통틀어 나에게 하반기 대박 행운을 가져다줄 것 같은 "나만의 행운 부적" 같은 장면은?', m: '나에게 가장 확실하게 밝고 유쾌한 에너지를 수혈해 준 작품 3가지와 그 이유는 무엇인가요?' },
            MC: { title: '🫂 [친근 공감] 이거 완전 내 얘기인데?', border: 'border-emerald-500', bg: 'bg-emerald-50/50', desc: '일러스트 속 인물의 행동이나 은은한 광기, 소소한 묘사 속에서 최근 나의 상태나 일상을 대입해 봅니다.', q1: '"앗, 이거 일하는(혹은 쉬는) 내 모습 도촬 당했나?" 격하게 고개를 끄덕이게 한 캐릭터가 있나요?', q2: '정신없이 바쁘게 달리던 나에게 잠시 멈춰 서서 부드러운 위로나 힐링을 선물해 준 장면은?', m: '유독 감정이 요동치며 소소한 일상 공감을 유도한 작품 3가지와 그 이유는 무엇인가요?' },
            MD: { title: '🃏 [위트 추적] 귀여운 뼈 때리기', border: 'border-purple-500', bg: 'bg-purple-50/50', desc: '무해한 비주얼 뒤에 현대 사회의 부조리나 모순, 도파민 중독을 씁쓸하게 풍자하는 디테일을 사냥합니다.', q1: '첫인상은 귀여웠는데 작품 제목이나 구석의 낙서를 보고 뒷목을 잡은 반전 요소가 있나요?', q2: '작가가 일러스트 속에 숨겨둔 킹받지만 반박 불가한 현대인 풍자 포인트는 무엇인가요?', m: '작가의 남다른 드립력과 영리한 유머 센스에 완전히 감탄한 작품 3가지와 그 이유는 무엇인가요?' }
        };

        function showCard(id) {
            const card = cardsData[id];
            const content = document.getElementById('card-content');
            
            content.innerHTML = `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-5 border-b border-t-8 ${card.border} ${card.bg}">
                        <h2 class="text-lg font-bold text-slate-800 leading-tight">${card.title}</h2>
                    </div>
                    <div class="p-5 space-y-5">
                        <p class="text-xs text-slate-500 leading-relaxed bg-slate-50/80 p-3 rounded-xl border-l-2 border-slate-300 font-medium">
                            ${card.desc}
                        </p>
                        <div class="space-y-4 pt-2">
                            <div class="flex items-start">
                                <span class="text-slate-400 font-bold text-sm mr-2.5">Q1.</span>
                                <p class="text-xs text-slate-700 leading-relaxed pt-0.5">${card.q1}</p>
                            </div>
                            <div class="flex items-start">
                                <span class="text-slate-400 font-bold text-sm mr-2.5">Q2.</span>
                                <p class="text-xs text-slate-700 leading-relaxed pt-0.5">${card.q2}</p>
                            </div>
                        </div>
                        <div class="mt-4 p-4 rounded-xl border border-dashed ${card.border.replace('border-', 'border-')} bg-white shadow-inner">
                            <p class="text-xs font-bold text-slate-900 mb-1 flex items-center">
                                <span class="inline-block w-1.5 h-3 bg-slate-800 mr-2 rounded-full"></span>
                                필수 기록 미션
                            </p>
                            <p class="text-xs font-bold text-slate-800 leading-relaxed">${card.m}</p>
                        </div>
                    </div>
                </div>
            `;

            // 화면 전환
            document.getElementById('step-question').classList.add('hidden');
            const stepCard = document.getElementById('step-card');
            stepCard.classList.remove('hidden');
            stepCard.classList.add('flex');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetApp() {
            document.getElementById('step-card').classList.add('hidden');
            document.getElementById('step-card').classList.remove('flex');
            const stepQuestion = document.getElementById('step-question');
            stepQuestion.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
